<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avrrio Trade AI — Dashboard</title>
    <style>
      :root {
        --bg: #0f1117; --card: #1a1d27; --line: #2a2e3c; --text: #e6e8ee;
        --muted: #8b90a0; --ok: #3fb950; --warn: #d29922; --block: #f85149; --blue: #2563eb;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font: 14px/1.5 -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); }
      header { padding: 14px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; }
      h1 { font-size: 17px; margin: 0; }
      .tag { color: var(--muted); font-size: 12px; }
      .spacer { flex: 1; }
      main { padding: 24px; display: grid; gap: 16px; max-width: 1040px; }
      .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
      .card h2 { font-size: 12px; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; letter-spacing: .04em; }
      .big { font-size: 24px; font-weight: 600; }
      .warnings li { color: var(--warn); }
      label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
      input, select, button { background: #0f1117; color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 8px; font: inherit; width: 100%; }
      button { cursor: pointer; font-weight: 600; }
      .btn-primary { background: var(--blue); border-color: var(--blue); }
      .btn-ok { background: var(--ok); border-color: var(--ok); color: #06210e; }
      .btn-danger { background: var(--block); border-color: var(--block); }
      .btn-ghost { background: transparent; }
      .row { display: grid; gap: 8px; grid-template-columns: repeat(3, 1fr); }
      .row6 { display: grid; gap: 8px; grid-template-columns: repeat(6, 1fr); }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
      th { color: var(--muted); font-weight: 500; }
      .v-warn { color: var(--warn); } .v-block { color: var(--block); }
      .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; border: 1px solid var(--line); }
      .pill.pending { color: var(--warn); border-color: var(--warn); }
      .pill.armed { color: var(--blue); border-color: var(--blue); }
      .pill.executed { color: var(--ok); border-color: var(--ok); }
      .pill.blocked, .pill.rejected { color: var(--block); border-color: var(--block); }
      .rec { display: grid; gap: 6px; border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
      .rec .actions { display: flex; gap: 8px; }
      .rec .actions button { width: auto; padding: 6px 14px; }
      .hidden { display: none; }
      #login { max-width: 360px; margin: 80px auto; }
      .kill { display: flex; align-items: center; gap: 10px; }
    </style>
  </head>
  <body>
    <!-- Login -->
    <div id="login" class="card">
      <h2>Avrrio Trade AI — sign in</h2>
      <label>Dashboard password</label>
      <input id="password" type="password" placeholder="DASHBOARD_PASSWORD" />
      <button class="btn-primary" id="loginBtn" style="margin-top:10px">Sign in</button>
      <div id="loginErr" class="v-block" style="margin-top:8px"></div>
      <div class="tag" style="margin-top:8px">If no password is configured, leave blank and sign in.</div>
    </div>

    <!-- App -->
    <div id="app" class="hidden">
      <header>
        <h1>Avrrio Trade AI</h1>
        <span class="tag" id="modeTag"></span>
        <span class="spacer"></span>
        <button class="btn-ghost" id="tradeModeBtn" style="width:auto;padding:8px 16px">Trading: paper</button>
        <button class="btn-danger" id="killBtn" style="width:auto;padding:8px 16px">🛑 Emergency Stop</button>
      </header>
      <main>
        <ul class="warnings" id="warnings"></ul>
        <div class="grid" id="account"></div>

        <div class="card">
          <h2>🔥 Top opportunities today (Avrrio Score)</h2>
          <div class="kill" style="margin-bottom:10px">
            <label style="margin:0">Scan:</label>
            <label class="tag"><input type="checkbox" id="cFut" checked style="width:auto"> Futures</label>
            <label class="tag"><input type="checkbox" id="cStk" checked style="width:auto"> Stocks</label>
            <label class="tag"><input type="checkbox" id="cCry" checked style="width:auto"> Crypto</label>
            <button class="btn-ghost" id="scanBtn" style="width:auto;padding:6px 14px">Scan now</button>
            <button class="btn-primary" id="cycleBtn" style="width:auto;padding:6px 14px" title="Scan, qualify (score≥85 & R/R≥2), and create + SMS the top 1–3 setups">Run scan cycle (alert worthy)</button>
            <span class="tag" id="schedTag"></span>
          </div>
          <div class="kill" style="margin-bottom:10px">
            <button class="btn-ghost" id="schedToggle" style="width:auto;padding:6px 12px">Enable scheduler</button>
            <label class="tag" style="margin:0">Interval (min) <input id="schedInterval" type="number" value="20" style="width:70px;display:inline-block;padding:4px"></label>
            <span class="tag" id="schedTimes"></span>
          </div>
          <div id="scan"></div>
        </div>

        <div class="card">
          <h2>Propose a trade (AI consensus + risk check, then YOU approve)</h2>
          <div class="row6">
            <div><label>Setup</label><input id="setupName" placeholder="(optional)" /></div>
            <div><label>Asset class</label>
              <select id="assetClass"><option value="">all</option><option value="futures">futures</option><option value="stocks">stocks</option><option value="crypto">crypto</option></select>
            </div>
            <div><label>Symbol</label><select id="symbolPicker"></select></div>
            <div><label>Symbol (manual)</label><input id="symbol" value="NQ" /></div>
            <div><label>Side</label><select id="side"><option>long</option><option>short</option></select></div>
            <div><label>Size</label><input id="size" type="number" value="1" /></div>
          </div>
          <div class="row6" style="margin-top:8px">
            <div><label>Entry</label><input id="entry" type="number" value="20000" /></div>
            <div><label>Stop</label><input id="stop" type="number" value="19960" /></div>
            <div><label>Target</label><input id="target" type="number" value="20080" /></div>
            <div style="grid-column: span 3; display:flex; align-items:end; gap:8px">
              <button class="btn-primary" id="proposeBtn" style="width:auto">Generate recommendation</button>
              <span id="tradeNote" class="tag" style="align-self:center"></span>
            </div>
          </div>
          <div id="proposeErr" class="v-block" style="margin-top:8px"></div>
        </div>

        <div class="card">
          <h2>Pending approvals</h2>
          <div id="recs"></div>
        </div>

        <div class="card">
          <h2>Audit log (latest)</h2>
          <table id="audit"><thead><tr><th>Time</th><th>Type</th><th>Actor</th><th>Details</th></tr></thead><tbody></tbody></table>
        </div>
      </main>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      let TOKEN = null;
      const authHeaders = () => (TOKEN ? { authorization: "Bearer " + TOKEN } : {});
      const api = (path, opts = {}) =>
        fetch(path, {
          ...opts,
          headers: { "content-type": "application/json", ...authHeaders(), ...(opts.headers || {}) },
        });

      // Safe JSON parse: never blows up on an HTML error page (502/500/timeout).
      async function j(res) {
        const ct = res.headers.get("content-type") || "";
        if (!res.ok || !ct.includes("application/json")) {
          const txt = await res.text().catch(() => "");
          throw new Error(`HTTP ${res.status} ${txt.slice(0, 80)}`.trim());
        }
        return res.json();
      }
      function showError(msg) {
        $("warnings").innerHTML =
          `<li class="v-block">⚠️ ${msg}</li>` + $("warnings").innerHTML;
      }

      async function login() {
        const r = await fetch("/api/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ password: $("password").value }),
        });
        if (!r.ok) { $("loginErr").textContent = "Invalid password."; return; }
        TOKEN = (await r.json()).token;
        $("login").classList.add("hidden");
        $("app").classList.remove("hidden");
        await refresh();
        await loadSymbols();
        scan();
      }

      async function refresh() {
        let s;
        try {
          s = await api("/api/status").then(j);
        } catch (e) {
          showError("Could not reach the backend: " + e.message);
          return;
        }
        $("warnings").innerHTML = (s.warnings || []).map((w) => `<li>${w}</li>`).join("");
        if (s.accountError) showError("Account data unavailable: " + s.accountError);
        const a = s.account;
        const t = s.topstepx || {};
        $("modeTag").textContent =
          `${s.offline ? "OFFLINE" : "LIVE-DATA"} · trading: ${s.liveTrading ? "LIVE" : "paper"} · ${s.semiAutonomous ? "semi-auto" : "manual"} · AI: ${s.providers.join("+") || "none"} · alerts: ${s.notifications ? s.notifications.primaryChannel : "off"}`;
        $("killBtn").textContent = s.killSwitch.engaged ? "✅ Clear Emergency Stop" : "🛑 Emergency Stop";
        $("killBtn").dataset.engaged = s.killSwitch.engaged ? "1" : "";
        $("tradeModeBtn").textContent = `Trading: ${s.liveTrading ? "LIVE" : "paper"}`;
        $("tradeModeBtn").className = s.liveTrading ? "btn-danger" : "btn-ghost";
        $("tradeModeBtn").dataset.live = s.liveTrading ? "1" : "";
        if (s.scheduler) {
          const sc = s.scheduler;
          $("schedTag").textContent = `scheduler ${sc.enabled ? "ON" : "off"} · scans today ${sc.scansToday}`;
          $("schedToggle").textContent = sc.enabled ? "Disable scheduler" : "Enable scheduler";
          $("schedToggle").className = sc.enabled ? "btn-danger" : "btn-ok";
          $("schedToggle").dataset.enabled = sc.enabled ? "1" : "";
          if (document.activeElement !== $("schedInterval")) $("schedInterval").value = sc.intervalMinutes || 20;
          $("schedTimes").textContent = `last scan ${sc.lastScanTime ? new Date(sc.lastScanTime).toLocaleTimeString() : "—"} · last alert ${sc.lastAlertTime ? new Date(sc.lastAlertTime).toLocaleTimeString() : "—"}`;
        }
        if (t.usingFallbackData) showError("TopstepX market data unavailable — scans are using SIMULATED data. Fix the connection (Auth test).");
        if (s.notifications && s.notifications.smsMissing && s.notifications.smsMissing.length) showError("SMS not configured — missing: " + s.notifications.smsMissing.join(", "));
        $("account").innerHTML = `
          <div class="card"><h2>Account</h2><div>${a ? a.name : "—"}</div></div>
          <div class="card"><h2>Balance</h2><div class="big">${a ? "$"+a.balance.toLocaleString() : "—"}</div></div>
          <div class="card"><h2>Day P&amp;L</h2><div class="big" style="color:${a && a.dayPnl < 0 ? "var(--block)" : "var(--ok)"}">${a ? "$"+a.dayPnl.toLocaleString() : "—"}</div></div>
          <div class="card"><h2>Max daily loss</h2><div class="big">$${(s.safety.dailyMaxLoss || (a ? a.rules.maxDailyLoss : 0)).toLocaleString()}</div></div>
          <div class="card">
            <h2>TopstepX (${t.mode || "practice"})</h2>
            <div class="big" style="color:${stateColor(t.connectionState)}">${stateLabel(t.connectionState)}</div>
            <div class="tag">${t.message || ""}</div>
            <div class="tag">Acct ${t.accountId || "—"} · ${t.accountStatus || "—"} · BP $${(t.availableBuyingPower||0).toLocaleString()} · Pos ${t.openPositions||0}</div>
            <div class="tag">${t.lastSyncTime ? "synced "+new Date(t.lastSyncTime).toLocaleTimeString() : "never synced"}</div>
            <div class="actions" style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
              <button style="width:auto;padding:5px 10px" class="${t.connected ? "btn-danger" : "btn-ok"}" onclick="topstepx('${t.connected ? "disconnect" : "connect"}')">${t.connected ? "Disconnect" : "Connect"}</button>
              <button style="width:auto;padding:5px 10px" class="btn-ghost" onclick="authTest()">Auth test</button>
              <button style="width:auto;padding:5px 10px" class="btn-ghost" onclick="topstepx('sync')">Sync</button>
              <button style="width:auto;padding:5px 10px" class="btn-ghost" onclick="testTelegram()">Test Telegram</button>
              <button style="width:auto;padding:5px 10px" class="btn-ghost" onclick="telegramDebug()">Telegram chat ID</button>
              <button style="width:auto;padding:5px 10px" class="btn-ghost" onclick="testSms()">Test SMS</button>
            </div>
          </div>`;
        loadRecs().catch((e) => showError("recs: " + e.message));
        loadAudit().catch(() => {});
      }

      window.topstepx = async (action) => {
        const r = await api("/api/topstepx/" + action, { method: action === "status" ? "GET" : "POST" }).then(j).catch((e) => ({ error: e.message }));
        if (r.error) showError("TopstepX " + action + ": " + r.error);
        refresh();
      };
      window.testSms = async () => {
        const r = await api("/api/alerts/sms/test", { method: "POST" }).then(j).catch((e) => ({ ok: false, info: e.message }));
        alert(r.ok ? "Test SMS sent." : "SMS not sent: " + (r.info || "error"));
      };
      window.testTelegram = async () => {
        const r = await api("/api/alerts/telegram/test", { method: "POST" }).then(j).catch((e) => ({ ok: false, info: e.message }));
        alert(r.ok ? "Test Telegram sent — check your chat." : "Telegram not sent: " + (r.info || "error"));
      };
      window.telegramDebug = async () => {
        const r = await api("/api/telegram/debug").then(j).catch((e) => ({ ok: false, info: e.message, chatIds: [] }));
        alert((r.ok ? "✅ " : "⚠️ ") + r.info + (r.chatIds && r.chatIds.length ? "\n\nchat_id(s): " + r.chatIds.join(", ") : ""));
      };
      window.authTest = async () => {
        const r = await api("/api/topstepx/auth-test", { method: "POST" }).then(j).catch((e) => ({ ok: false, message: e.message, present: {}, missing: [] }));
        const lines = [
          (r.ok ? "✅ " : "⚠️ ") + r.message,
          "",
          "Stage: " + (r.stage || "n/a") + (r.httpStatus != null ? " (HTTP " + r.httpStatus + ")" : ""),
          "Endpoint: " + (r.endpoint || "n/a"),
          "Auth method: " + (r.authMethod || "n/a"),
          r.missing && r.missing.length ? "Missing: " + r.missing.join(", ") : "Missing: none",
          "",
          "Env presence:",
          ...Object.entries(r.present || {}).map(([k, v]) => `  ${k}: ${v}`),
        ];
        alert(lines.join("\n"));
        refresh();
      };
      function stateLabel(st) {
        return ({
          connected: "Connected", demo: "Demo (no creds)",
          missing_credentials: "Missing credentials", invalid_credentials: "Invalid credentials",
          token_not_returned: "Token not returned", disconnected: "Not connected",
        })[st] || "Not connected";
      }
      function stateColor(st) {
        if (st === "connected" || st === "demo") return "var(--ok)";
        if (st === "disconnected") return "var(--muted)";
        return "var(--block)";
      }
      $("tradeModeBtn").addEventListener("click", async () => {
        const goLive = $("tradeModeBtn").dataset.live !== "1";
        if (goLive && !confirm("Switch to LIVE trading? Approved trades may be sent for real (still gated by all safety checks).")) return;
        await api("/api/settings", { method: "POST", body: JSON.stringify({ liveTrading: goLive }) }).then(j).catch((e) => showError("toggle: " + e.message));
        refresh();
      });

      async function loadRecs() {
        const recs = await api("/api/recommendations").then(j);
        $("recs").innerHTML =
          recs.slice().reverse().map((r) => {
            const viol = r.violations.map((v) => `<li class="v-${v.severity}">[${v.severity}] ${v.message}</li>`).join("");
            const ops = r.consensus.opinions.map((o) => `${o.provider}: ${o.recommendation}${o.available ? " ("+(o.confidence*100).toFixed(0)+"%)" : " —"}`).join(" · ");
            const canAct = r.status === "pending";
            return `<div class="rec">
              <div><b>${r.symbol} ${r.side.toUpperCase()} ×${r.size}</b> <span class="pill ${r.status}">${r.status}</span> ${r.setupName ? '<span class="tag">'+r.setupName+'</span>' : ''}</div>
              <div class="tag">Entry ${r.entry} · Stop ${r.stopLoss} · Target ${r.target} · Risk $${r.riskAmount.toFixed(0)} · R:R ${r.rewardRiskRatio.toFixed(2)}</div>
              <div class="tag">Consensus: <b>${r.consensus.recommendation}</b> (${r.consensus.agreement}/${r.consensus.available} agree, ${(r.consensus.confidence*100).toFixed(0)}%) · ${ops}</div>
              <div class="tag">News: ${r.news.blocked ? '<span class="v-block">'+r.news.reason+'</span>' : 'clear'} · Auto-eligible: ${r.autoEligible ? "yes" : "no"}${r.expiresAt ? ' · valid until '+new Date(r.expiresAt).toLocaleTimeString() : ''}</div>
              ${viol ? '<ul>'+viol+'</ul>' : ''}
              ${r.orderResult ? '<div class="tag">Order: '+r.orderResult.orderId+(r.orderResult.paper?" (paper)":" (LIVE)")+'</div>' : ''}
              ${canAct ? `<div class="actions">
                  <button class="btn-ok" onclick="approve('${r.id}','immediate')">Approve now</button>
                  <button class="btn-primary" onclick="approve('${r.id}','pre-approved')">Pre-approve (wait for entry)</button>
                  <button class="btn-danger" onclick="reject('${r.id}')">Reject</button>
                </div>` : ''}
            </div>`;
          }).join("") || '<div class="tag">No recommendations yet.</div>';
      }

      async function loadAudit() {
        const rows = await api("/api/audit").then(j);
        $("audit").querySelector("tbody").innerHTML = rows
          .map((e) => `<tr><td>${new Date(e.timestamp).toLocaleTimeString()}</td><td>${e.type}</td><td>${e.actor}</td><td class="tag">${JSON.stringify(e.details)}</td></tr>`)
          .join("");
      }

      let SYMBOLS = [];
      async function loadSymbols() {
        try {
          SYMBOLS = await api("/api/symbols").then(j);
          populatePicker();
          updateNote();
        } catch (e) {
          showError("symbols: " + e.message);
        }
      }
      function populatePicker() {
        const cls = $("assetClass").value;
        const list = SYMBOLS.filter((s) => !cls || s.assetClass === cls);
        $("symbolPicker").innerHTML =
          '<option value="">— pick —</option>' +
          list.map((s) => `<option value="${s.symbol}">${s.symbol} — ${s.name}${s.tradable ? "" : " [watchlist]"}</option>`).join("");
      }
      function updateNote() {
        const sym = ($("symbol").value || "").toUpperCase();
        const info = SYMBOLS.find((s) => s.symbol === sym);
        const note = $("tradeNote");
        if (info && info.tradable) { note.textContent = "✅ Tradable (futures)"; note.style.color = "var(--ok)"; }
        else if (info) { note.textContent = "👁 Watchlist only — analysis, not tradable"; note.style.color = "var(--warn)"; }
        else { note.textContent = "⚠ Manual symbol — not tradable"; note.style.color = "var(--warn)"; }
      }
      $("assetClass").addEventListener("change", populatePicker);
      $("symbolPicker").addEventListener("change", () => {
        if ($("symbolPicker").value) { $("symbol").value = $("symbolPicker").value; updateNote(); }
      });
      $("symbol").addEventListener("input", updateNote);

      async function scan() {
        const classes = [
          $("cFut").checked ? "futures" : "",
          $("cStk").checked ? "stocks" : "",
          $("cCry").checked ? "crypto" : "",
        ].filter(Boolean).join(",");
        // Staged progress so "Scan now" never just hangs silently.
        const stages = [
          "Connecting to backend",
          "Scanning Futures",
          "Scanning Stocks",
          "Scanning Crypto",
          "Calculating Avrrio Score",
          "Generating opportunities",
        ];
        let si = 0;
        $("scan").innerHTML = `<div class="tag" id="scanStage">⏳ ${stages[0]}…</div>`;
        const timer = setInterval(() => {
          si = Math.min(si + 1, stages.length - 1);
          const el = $("scanStage");
          if (el) el.textContent = `⏳ ${stages[si]}…`;
        }, 350);
        let rows;
        try {
          rows = await api(`/api/scan?limit=8&classes=${classes}`).then(j);
        } catch (e) {
          clearInterval(timer);
          $("scan").innerHTML = `<div class="v-block">Scan failed: ${e.message}</div>`;
          return;
        }
        clearInterval(timer);
        $("scan").innerHTML = rows.map((r, i) => {
          const color = r.score >= 80 ? "var(--ok)" : r.score >= 60 ? "var(--warn)" : "var(--muted)";
          return `<div class="rec">
            <div><b>${i + 1}. ${r.symbol}</b> <span class="tag">${r.name}</span> <span class="pill" style="border-color:${color};color:${color}">Score ${r.score}/100</span>
              <span class="tag">${r.direction} · ${(r.confidence * 100).toFixed(0)}%${r.tradable ? "" : " · watchlist"}</span></div>
            <div class="tag">${r.reasons.map((x) => "✓ " + x).join("  ")}</div>
            <div class="tag">Trend ${r.components.trend|0} · Vol ${r.components.volume|0} · News ${r.components.news|0} · Mom ${r.components.momentum|0} · Risk ${r.components.risk|0}</div>
            ${r.tradable ? `<div class="actions"><button class="btn-ghost" style="width:auto;padding:6px 14px" onclick="useSymbol('${r.symbol}','${r.assetClass}')">Use in propose ↓</button></div>` : ""}
          </div>`;
        }).join("") || '<div class="tag">No results.</div>';
      }
      window.useSymbol = (sym, cls) => {
        $("assetClass").value = cls; populatePicker();
        $("symbol").value = sym; $("symbolPicker").value = sym; updateNote();
        document.getElementById("symbol").scrollIntoView({ behavior: "smooth", block: "center" });
      };
      $("schedToggle").addEventListener("click", async () => {
        const enable = $("schedToggle").dataset.enabled !== "1";
        const intervalMinutes = Number($("schedInterval").value) || 20;
        await api("/api/scheduler/config", { method: "POST", body: JSON.stringify({ enabled: enable, intervalMinutes }) }).then(j).catch((e) => showError("scheduler: " + e.message));
        refresh();
      });
      $("scanBtn").addEventListener("click", scan);
      $("cycleBtn").addEventListener("click", async () => {
        $("cycleBtn").textContent = "Running…";
        const r = await api("/api/scheduler/run", { method: "POST" }).then(j).catch((e) => ({ error: e.message }));
        $("cycleBtn").textContent = "Run scan cycle (alert worthy)";
        if (r.error) { showError("scan cycle: " + r.error); return; }
        alert(`Scanned ${r.scanned}, qualifying ${r.qualifying}, alerted ${r.alerted}` + (r.refs && r.refs.length ? "\n" + r.refs.join(", ") : "\nNo qualifying setups (nothing sent)."));
        refresh();
      });

      window.approve = async (id, mode) => {
        const label = mode === "pre-approved"
          ? "Pre-approve this trade? It will execute only when the entry is reached and all checks still pass."
          : "Approve and place this trade now?";
        if (!confirm(label)) return;
        const r = await api(`/api/recommendations/${id}/approve`, {
          method: "POST", body: JSON.stringify({ mode }),
        }).then(j);
        if (r.error) alert("Error: " + r.error);
        refresh();
      };
      window.reject = async (id) => {
        await api(`/api/recommendations/${id}/reject`, { method: "POST", body: JSON.stringify({ reason: "operator rejected" }) });
        refresh();
      };

      $("proposeBtn").addEventListener("click", async () => {
        $("proposeErr").textContent = "";
        const idea = {
          setupName: $("setupName").value || undefined,
          symbol: $("symbol").value,
          side: $("side").value,
          size: Number($("size").value),
          entry: Number($("entry").value),
          stopLoss: Number($("stop").value),
          target: Number($("target").value),
        };
        const r = await api("/api/propose", { method: "POST", body: JSON.stringify(idea) }).then(j);
        if (r.error) { $("proposeErr").textContent = r.error; return; }
        refresh();
      });

      $("killBtn").addEventListener("click", async () => {
        const engaged = $("killBtn").dataset.engaged === "1";
        if (engaged) {
          await api("/api/kill-switch", { method: "POST", body: JSON.stringify({ engage: false }) });
        } else {
          if (!confirm("Engage Emergency Stop? All trading will be blocked.")) return;
          await api("/api/kill-switch", { method: "POST", body: JSON.stringify({ engage: true, reason: "operator emergency stop" }) });
        }
        refresh();
      });

      $("loginBtn").addEventListener("click", login);
      $("password").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    </script>
  </body>
</html>
